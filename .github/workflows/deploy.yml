name: Deploy to Hetzner (manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}

    steps:
      - name: Skip when SSH key is not configured
        if: env.HETZNER_SSH_KEY == ''
        run: |
          echo "::notice::HETZNER_SSH_KEY is not configured; skipping Hetzner deployment."

      - name: Deploy via SSH
        if: env.HETZNER_SSH_KEY != ''
        uses: appleboy/ssh-action@v1
        with:
          host: 49.13.169.95
          username: root
          key: ${{ env.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "=== $(date -Iseconds) === DEPLOY START ==="

            cd /opt/hungarian-law-mcp/Hungarian-law-mcp

            # Ensure origin points to the correct repo
            git remote set-url origin https://github.com/ryzen3100/magyar-jogszabaly-mcp.git

            # Pull latest code
            git fetch origin
            git reset --hard origin/main
            echo "Git updated: $(git log --oneline -1)"

            # Install deps + rebuild native modules
            npm ci --ignore-scripts
            npm rebuild better-sqlite3

            # Build TypeScript
            npm run build

            # Rebuild database (includes EU mappings)
            node --import tsx scripts/build-db.ts

            # Copy DB to Docker volume
            VOLUME_PATH=$(docker volume inspect hungarian-law-mcp_law-data -f '{{.Mountpoint}}' 2>/dev/null || docker volume inspect hungarian-law-docker_law-data -f '{{.Mountpoint}}')
            cp data/database.db "$VOLUME_PATH/database.db"

            # Rebuild and restart container
            cd /opt/hungarian-law-mcp
            docker compose build hungarian-law-mcp
            docker compose up -d hungarian-law-mcp

            # Health check
            sleep 3
            curl -sf http://localhost:3100/health || echo "WARNING: Health check failed"

            echo "=== $(date -Iseconds) === DEPLOY DONE ==="
